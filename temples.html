<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album - Eli Avila</title>
    <meta name="description" content="Temple album contains different temples of the world and photos of them.">
    <meta name="author" content="Eli Avila">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js" defer></script>

</head>
<body>
    <header>
        <span id="album-header">Temple Album</span>
        <nav>
            <ul class="navigation">
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Home</h1>
        <div class="temple-grid">
            <figure class="temple-figure">
                <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Salt_Lake_Temple,_Utah_-_Sept_2004-2.jpg" alt="Salt Lake Temple with tall granite spires" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Salt Lake City, Utah</span><span class="temple-year">Dedicated 1893</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Mesa_Temple.jpg" alt="Mesa Arizona Temple, a neoclassical temple building" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Mesa, Arizona</span><span class="temple-year">Dedicated 1927</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Los_Angeles_Temple_1.jpg" alt="Los Angeles California Temple with a tall single spire" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Los Angeles, California</span><span class="temple-year">Dedicated 1956</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="https://commons.wikimedia.org/wiki/Special:FilePath/London_England_Temple.jpg" alt="London England Temple surrounded by trees" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">London, England</span><span class="temple-year">Dedicated 1958</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Oakland_Mormon_Temple.jpg" alt="Oakland California Temple with five spires on a hillside" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Oakland, California</span><span class="temple-year">Dedicated 1964</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Washington_DC_Temple.JPG" alt="Washington D.C. Temple with six golden spires" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Washington, D.C.</span><span class="temple-year">Dedicated 1974</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Hong_Kong_China_Temple.jpg" alt="Hong Kong China Temple, a multi-story granite building" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Hong Kong, China</span><span class="temple-year">Dedicated 1996</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Draper_LDS_Temple.jpg" alt="Draper Utah Temple overlooking the Salt Lake Valley" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Draper, Utah</span><span class="temple-year">Dedicated 2009</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Paysonutah.jpg" alt="Payson Utah Temple with a central spire" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Payson, Utah</span><span class="temple-year">Dedicated 2015</span></figcaption>
            </figure>
        </div>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> Eli Avila &mdash; Mexico</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
