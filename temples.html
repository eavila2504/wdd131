<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album - Eli Avila</title>
    <meta name="description" content="Temple album contains different temples of the world and photos of them.">
    <meta name="author" content="Eli Avila">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js" defer></script>

</head>
<body>
    <header>
        <span id="album-header">Temple Album</span>
        <nav>
            <ul class="navigation">
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Home</h1>
        <div class="temple-grid">
            <figure class="temple-figure">
                <img src="https://churchofjesuschristtemples.org/assets/img/temples/salt-lake-temple/salt-lake-temple-15669-main.jpg" alt="Salt Lake Temple with tall granite spires" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Salt Lake City, Utah</span><span class="temple-year">Dedicated 1893</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="https://churchofjesuschristtemples.org/assets/img/temples/mesa-arizona-temple/mesa-arizona-temple-46561-main.jpg" alt="Mesa Arizona Temple, with a pink cloud sky" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Mesa, Arizona</span><span class="temple-year">Dedicated 1927</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="images/san-diego-temple.jpeg" alt="San Diego California Temple with a tall single spire" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">San Diego, California</span><span class="temple-year">Dedicated 1993</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="https://churchofjesuschristtemples.org/assets/img/temples/london-england-temple/london-england-temple-56886-main.jpg" alt="London England Temple with sunset as a background" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">London, England</span><span class="temple-year">Dedicated 1958</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="https://www.churchofjesuschrist.org/imgs/42fe168daf1b11eeafb4eeeeac1e9006b9466aaa/full/500%2C/0/default" alt="Puebla Mexico Temple with a sunset" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Puebla, Mexico</span><span class="temple-year">Dedicated 2024</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="images/manti-temple.jpeg" alt="Manti Utah Temple on the top of hill" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Manti, Utah</span><span class="temple-year">Dedicated 1888</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="images/hong-kong-china-temple.jpg" alt="Hong Kong China Temple, a multi-story granite building" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Hong Kong, China</span><span class="temple-year">Dedicated 1996</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="images/mexico-city-temple.jpeg" alt="Mexico City Mexico Temple with a central spire" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Mexico City, Mexico</span><span class="temple-year">Dedicated 1983</span></figcaption>
            </figure>
            <figure class="temple-figure">
                <img src="https://www.churchofjesuschrist.org/imgs/17e2c70d687fffedfe115197e57fa8f5d1d369bb/full/500%2C/0/default" alt="Rome Italy Temple" class="temple-image" loading="lazy">
                <figcaption><span class="temple-name">Rome, Italy</span><span class="temple-year">Dedicated 2019</span></figcaption>
            </figure>
        </div>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> Eli Avila &mdash; Mexico</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
